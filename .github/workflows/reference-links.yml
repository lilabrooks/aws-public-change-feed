name: Reference links

"on":
  pull_request:
  schedule:
    - cron: "17 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reference-links
  cancel-in-progress: false

jobs:
  local-reference-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Validate reference metadata and local links
        run: python3 scripts/validate_references.py

  online-reference-check:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Restore link-check cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .lycheecache
          key: lychee-v0.24.2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            lychee-v0.24.2-${{ runner.os }}-

      - name: Check external reference links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8  # v2.9.0
        with:
          args: .
          fail: true
          failIfEmpty: true
          format: markdown
          jobSummary: true
          lycheeVersion: v0.24.2
          output: lychee-report.md
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save link-check cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .lycheecache
          key: lychee-v0.24.2-${{ runner.os }}-${{ github.run_id }}
